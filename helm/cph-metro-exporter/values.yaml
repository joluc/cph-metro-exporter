replicaCount: 1

image:
  repository: ghcr.io/joluc/cph-metro-exporter
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9100"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 9100
  targetPort: 9100
  annotations: {}

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  port: "9100"
  logLevel: "info"
  requestTimeout: "10s"
  scrapeInterval: "30m"  # Updated default: 30 minutes
  demoMode: false

# Rejseplanen API configuration
# Either set apiKey directly or use existingSecret
rejseplanen:
  # API key (will be stored in a Secret)
  apiKey: ""

  # Or reference an existing Secret
  existingSecret: ""
  existingSecretKey: "api-key"

# Prometheus ServiceMonitor (requires prometheus-operator)
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: 9100
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 9100
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
