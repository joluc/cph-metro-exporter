apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cph-metro-exporter.fullname" . }}
  labels:
    {{- include "cph-metro-exporter.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REQUEST_TIMEOUT: {{ .Values.config.requestTimeout | quote }}
  SCRAPE_INTERVAL: {{ .Values.config.scrapeInterval | quote }}
  {{- if .Values.config.demoMode }}
  DEMO_MODE: "true"
  {{- end }}
